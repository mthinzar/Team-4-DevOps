version: "3.8"

services:
  mongo:
    image: mongo:7
    container_name: launchlab-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  review-backend:
    build: ./backend
    container_name: launchlab-review-backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongo:27017/launchlab_reviews
      - JWT_SECRET=change_this_to_a_long_random_secret
      - REQUIRE_VERIFIED_PURCHASE=false
    depends_on:
      - mongo

volumes:
  mongo-data:
